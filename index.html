const langbar = document.getElementById('langbar');
const content = document.getElementById('content');

function render(){
  LANGS.forEach(L=>{
    const btn = document.createElement('button');
    btn.className='langbtn';
    btn.textContent=L.label;
    btn.dataset.lang=L.code;
    btn.setAttribute('aria-label', L.title);
    btn.addEventListener('click', ()=>selectLang(L.code));
    langbar.appendChild(btn);

    const page = document.createElement('section');
    page.className='page';
    page.id='page-'+L.code;
    page.innerHTML = `
      <div class="hero">
        <span class="badge">${L.badge}</span>
        <h1>${L.title}</h1>
        <div class="native">${L.native}</div>
        <p class="lead">${L.lead}</p>
        <svg class="drip-divider" viewBox="0 0 120 34" fill="none">
          <path d="M2 6c14 0 14 10 28 10s14-10 28-10 14 10 28 10 14-10 28-10" stroke="#E0A83E" stroke-width="2" stroke-linecap="round"/>
          <circle cx="60" cy="26" r="4" fill="#B9752E"/>
        </svg>
      </div>

      <div class="section">
        <h2 class="section-title"><span class="num">01</span>${L.introTitle}</h2>
        <p style="font-size:15px; color:var(--ink-soft); max-width:680px;">${L.introText}</p>
      </div>

      <div class="section">
        <h2 class="section-title"><span class="num">02</span>${L.charTitle}</h2>
        <div class="grid2">
          ${L.chars.map(c=>`<div class="tile"><div class="k">${c.k}</div><div class="v">${c.v}</div></div>`).join('')}
        </div>
      </div>

      <div class="section">
        <h2 class="section-title"><span class="num">03</span>${L.benefitsTitle}</h2>
        <div class="benefits">
          ${L.benefits.map(b=>`
            <div class="benefit">
              <div class="icon">${ICONS[b.icon]||''}</div>
              <div><h4>${b.h}</h4><p>${b.p}</p></div>
            </div>`).join('')}
        </div>
      </div>

      <div class="section">
        <h2 class="section-title"><span class="num">04</span>${L.chemTitle}</h2>
        <div class="chem">
          ${L.chem.map(c=>`<div class="chem-row"><div class="k">${c.k}</div><div class="v">${c.v}</div></div>`).join('')}
        </div>
      </div>

      <div class="section">
        <h2 class="section-title"><span class="num">05</span>${L.skinTitle}</h2>
        <div class="grid3">
          ${L.skin.map(s=>`<div class="tile"><div class="k">${s.h}</div><div class="v">${s.p}</div></div>`).join('')}
        </div>
      </div>

      <div class="section">
        <h2 class="section-title"><span class="num">06</span>${L.prodTitle}</h2>
        <div class="production"><p>${L.prodText}</p></div>
      </div>

      <div class="section">
        <h2 class="section-title"><span class="num">07</span>${L.usesTitle}</h2>
        <div class="uses">
          ${L.uses.map(u=>`<div class="use"><span class="glyph">${u.g}</span><h4>${u.h}</h4><p>${u.p}</p></div>`).join('')}
        </div>
      </div>

      <footer>${L.footer}</footer>
    `;
    content.appendChild(page);
  });
}

function selectLang(code){
  document.querySelectorAll('.langbtn').forEach(b=>b.classList.toggle('active', b.dataset.lang===code));
  document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active', p.id==='page-'+code));
  document.documentElement.lang = code;
  window.scrollTo({top:0, behavior:'smooth'});
}

render();
